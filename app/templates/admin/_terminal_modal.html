<style>
#terminal-output {
    scrollbar-width: thin;
    scrollbar-color: #555 #1e1e1e;
}
#terminal-output::-webkit-scrollbar {
    width: 8px;
}
#terminal-output::-webkit-scrollbar-track {
    background: #1e1e1e;
}
#terminal-output::-webkit-scrollbar-thumb {
    background: #555;
    border-radius: 4px;
}
#terminal-output::-webkit-scrollbar-thumb:hover {
    background: #777;
}
.terminal-cursor {
    color: #569cd6;
    display: inline;
    font-size: inherit;
    line-height: inherit;
}
.terminal-cursor .cursor-block,
.terminal-cursor .cursor-under {
    position: absolute;
    color: #569cd6;
}
.terminal-cursor .cursor-under {
    opacity: 0;
}
.terminal-cursor.blinking .cursor-block {
    animation: block-blink 1s step-start infinite;
}
.terminal-cursor.blinking .cursor-under {
    animation: under-blink 1s step-start infinite;
}
@keyframes block-blink {
    0% { opacity: 1; }
    50% { opacity: 0; }
}
@keyframes under-blink {
    0% { opacity: 0; }
    50% { opacity: 1; }
}
</style>
<div class="modal fade" id="terminalModal" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content bg-dark">
            <div class="modal-header border-secondary">
                <h5 class="modal-title text-light" id="terminalModalTitle">Processing...</h5>
            </div>
            <div class="modal-body">
                <div id="terminal-output" style="background: #1e1e1e; color: #d4d4d4; font-family: 'Courier New', monospace; font-size: 0.875rem; padding: 1rem; border-radius: 0.375rem; min-height: 120px; max-height: 400px; overflow-y: auto; white-space: pre-wrap;"></div>
            </div>
            <div class="modal-footer border-secondary">
                <a href="#" class="btn btn-outline-light" id="terminal-start-over" style="display: none;">Start Over</a>
            </div>
        </div>
    </div>
</div>
