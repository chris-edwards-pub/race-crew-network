{% extends "base.html" %}
{% block title %}Forgot Password — Race Crew Network{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-sm">
            <div class="card-body">
                <h4 class="card-title mb-3">Forgot Password</h4>
                <p class="text-muted">Enter your email address and we'll send you a link to reset your password.</p>
                <form method="POST" action="{{ url_for('auth.forgot_password') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" required autofocus>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Send Reset Link</button>
                </form>
                <div class="text-center mt-3">
                    <a href="{{ url_for('auth.login') }}" class="text-muted small">Back to Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
