name: Deploy to Lightsail

on:
  push:
    branches: [master]

  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy (defaults to master)"
        required: false
        default: "master"
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: chris-edwards-pub/race-crew-network

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref }}

      - name: Extract version from app/__init__.py
        id: version
        run: |
          VERSION=$(grep -oP '(?<=__version__ = ")[^"]+' app/__init__.py)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  scan-image:
    name: Scan Image for Vulnerabilities
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-and-push
    permissions:
      contents: read
      security-events: write

    env:
      TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db:2
      TRIVY_JAVA_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-java-db:1

    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.34.2
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
          output: trivy-results.txt

      - name: Upload scan results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-vulnerability-report
          path: trivy-results.txt
          retention-days: 30

      - name: Write Trivy results to job summary
        if: always()
        run: |
          if [ -f trivy-results.txt ]; then
            echo "## 🔍 Trivy Vulnerability Scan Results" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat trivy-results.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## 🔍 Trivy Vulnerability Scan Results" >> "$GITHUB_STEP_SUMMARY"
            echo "⚠️ trivy-results.txt was not found — the scan may not have produced output." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Run Trivy for SARIF output
        if: always()
        uses: aquasecurity/trivy-action@0.34.2
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: scan-image

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to Lightsail Container Service
        run: |
          aws lightsail create-container-service-deployment \
            --service-name ${{ vars.CONTAINER_SERVICE_NAME }} \
            --containers '{
              "web": {
                "image": "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}",
                "ports": {"8000": "HTTP"},
                "environment": {
                  "DATABASE_URL": "mysql+pymysql://${{ vars.MYSQL_USER }}:${{ secrets.MYSQL_PASSWORD }}@${{ vars.DB_ENDPOINT }}/${{ vars.MYSQL_DATABASE }}",
                  "SECRET_KEY": "${{ secrets.SECRET_KEY }}",
                  "UPLOAD_FOLDER": "/app/uploads",
                  "BUCKET_NAME": "${{ vars.BUCKET_NAME }}",
                  "AWS_ACCESS_KEY_ID": "${{ secrets.BUCKET_ACCESS_KEY_ID }}",
                  "AWS_SECRET_ACCESS_KEY": "${{ secrets.BUCKET_SECRET_ACCESS_KEY }}",
                  "AWS_REGION": "us-east-1",
                  "INIT_ADMIN_EMAIL": "${{ secrets.INIT_ADMIN_EMAIL }}",
                  "INIT_ADMIN_PASSWORD": "${{ secrets.INIT_ADMIN_PASSWORD }}",
                  "ANTHROPIC_API_KEY": "${{ secrets.ANTHROPIC_API_KEY }}"
                }
              }
            }' \
            --public-endpoint '{
              "containerName": "web",
              "containerPort": 8000,
              "healthCheck": {
                "path": "/",
                "successCodes": "200-499",
                "intervalSeconds": 30,
                "timeoutSeconds": 5
              }
            }'
